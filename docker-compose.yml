version: "3.9"

# DeskMate — start all three services with one command:
#   docker-compose up --build
#
# Make sure to create orchestrator/.env with your ANTHROPIC_API_KEY first.
# Copy orchestrator/.env.example → orchestrator/.env and fill in the key.

services:

  rag-service:
    build:
      context: ./rag-service
      dockerfile: Dockerfile
    container_name: deskmate-rag
    environment:
      HANDBOOK_PATH: /data/IT_Handbook.txt
    volumes:
      # Mount the shared data/ folder so the RAG service can read the handbook
      - ./data:/data:ro
    ports:
      - "8000:8000"   # Swagger UI available at http://localhost:8000/docs
    networks:
      - deskmate-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/rag/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: deskmate-orchestrator
    env_file:
      - ./orchestrator/.env
    environment:
      PORT: "3001"
      RAG_SERVICE_URL: http://rag-service:8000
      FRONTEND_URL: http://localhost
    ports:
      - "3001:3001"
    depends_on:
      rag-service:
        condition: service_healthy
    networks:
      - deskmate-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: deskmate-frontend
    ports:
      - "80:80"
    depends_on:
      - orchestrator
    networks:
      - deskmate-net

networks:
  deskmate-net:
    driver: bridge
